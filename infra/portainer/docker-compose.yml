name: portainer

volumes:
  portainer_data:

networks:
  portainer:
    driver: bridge

services:
  # ─── Portainer CE (Docker management UI) ──────────────────
  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    restart: unless-stopped
    ports:
      - "9010:9000"   # HTTP UI
      - "9443:9443"   # HTTPS UI
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    networks:
      - portainer
