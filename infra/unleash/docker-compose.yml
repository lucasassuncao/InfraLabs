name: unleash

volumes:
  unleash_postgres_data:

networks:
  unleash:
    driver: bridge

services:
  # ─── PostgreSQL (Unleash backend) ─────────────────────────
  unleash-db:
    image: postgres:16-alpine
    container_name: unleash-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: unleash
      POSTGRES_USER: unleash
      POSTGRES_PASSWORD: unleash
    volumes:
      - unleash_postgres_data:/var/lib/postgresql/data
    networks:
      - unleash
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U unleash -d unleash"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Unleash (Feature Flag Management) ───────────────────
  unleash:
    image: unleashorg/unleash-server:latest
    container_name: unleash
    restart: unless-stopped
    ports:
      - "4242:4242"   # Web UI + API
    environment:
      DATABASE_URL: postgres://unleash:unleash@unleash-db:5432/unleash
      DATABASE_SSL: "false"
      INIT_FRONTEND_API_TOKENS: "default:development.unleash-insecure-frontend-api-token"
      INIT_CLIENT_API_TOKENS: "default:development.unleash-insecure-api-token"
    depends_on:
      unleash-db:
        condition: service_healthy
    networks:
      - unleash
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4242/health | grep -q 'GOOD'"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
