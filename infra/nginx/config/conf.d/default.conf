# ─── Default server ───────────────────────────────────────
server {
  listen 80;
  server_name localhost;
  root /usr/share/nginx/html;
  index index.html;

  # Health check endpoint
  location /health {
    access_log off;
    return 200 'ok';
    add_header Content-Type text/plain;
  }

  location / {
    try_files $uri $uri/ =404;
  }
}

