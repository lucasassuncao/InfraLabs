name: lamp

volumes:
  lamp_mysql_data:

networks:
  lamp:
    driver: bridge

services:
  # ─── Apache + PHP ─────────────────────────────────────────
  apache:
    build: .
    image: lamp-apache:local
    container_name: lamp-apache
    restart: unless-stopped
    ports:
      - "8090:80"
    volumes:
      - ./www:/var/www/html
      - ./config/php.ini:/usr/local/etc/php/conf.d/custom.ini:ro
    environment:
      - APACHE_DOCUMENT_ROOT=/var/www/html
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - lamp

  # ─── MySQL ────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: lamp-mysql
    restart: unless-stopped
    ports:
      - "3308:3306"
    environment:
      MYSQL_ROOT_PASSWORD: admin
      MYSQL_DATABASE: lampdb
      MYSQL_USER: admin
      MYSQL_PASSWORD: admin
    volumes:
      - lamp_mysql_data:/var/lib/mysql
      - ./config/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - lamp
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "admin", "-padmin"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── phpMyAdmin ───────────────────────────────────────────
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: lamp-phpmyadmin
    restart: unless-stopped
    ports:
      - "5053:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: admin
      PMA_PASSWORD: admin
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - lamp
