name: lemp

volumes:
  lemp_mysql_data:

networks:
  lemp:
    driver: bridge

services:
  # ─── NGINX ────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: lemp-nginx
    restart: unless-stopped
    ports:
      - "8092:80"
    volumes:
      - ./www:/var/www/html:ro
      - ./config/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
    networks:
      - lemp

  # ─── PHP-FPM ──────────────────────────────────────────────
  php:
    build: .
    image: lemp-php:local
    container_name: lemp-php
    restart: unless-stopped
    volumes:
      - ./www:/var/www/html
      - ./config/php/custom.ini:/usr/local/etc/php/conf.d/custom.ini:ro
    networks:
      - lemp

  # ─── MySQL ────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: lemp-mysql
    restart: unless-stopped
    ports:
      - "3309:3306"
    environment:
      MYSQL_ROOT_PASSWORD: admin
      MYSQL_DATABASE: lempdb
      MYSQL_USER: admin
      MYSQL_PASSWORD: admin
    volumes:
      - lemp_mysql_data:/var/lib/mysql
      - ./config/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - lemp
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "admin", "-padmin"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── phpMyAdmin ───────────────────────────────────────────
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: lemp-phpmyadmin
    restart: unless-stopped
    ports:
      - "5054:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: admin
      PMA_PASSWORD: admin
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - lemp
