{{ define "title" }}{{ .Title }} — {{ .Site.Title }}{{ end }}

{{ define "main" }}
<article>
  <h1>{{ .Title }}</h1>
  <p style="color:#475569; font-size:.85rem;">
    {{ .Date.Format "02 Jan 2006" }}
    {{ range .Params.tags }} <span class="tag">{{ . }}</span>{{ end }}
  </p>
  <hr style="border-color:#1e293b; margin: 1.5rem 0;">
  {{ .Content }}
</article>
{{ end }}
