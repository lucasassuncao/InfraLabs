<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ block "title" . }}{{ .Site.Title }}{{ end }}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body   { font-family: system-ui, sans-serif; background: #0f172a; color: #cbd5e1; margin: 0; padding: 0; }
    header { background: #1e293b; padding: 1rem 2rem; border-bottom: 1px solid #334155; }
    header a { color: #38bdf8; text-decoration: none; font-size: 1.25rem; font-weight: 700; }
    nav a  { color: #94a3b8; text-decoration: none; margin-left: 1.5rem; font-size: .9rem; }
    nav a:hover { color: #38bdf8; }
    main   { max-width: 860px; margin: 2rem auto; padding: 0 1.5rem; }
    h1,h2  { color: #f1f5f9; }
    a      { color: #38bdf8; }
    code   { background: #1e293b; padding: .15rem .4rem; border-radius: 4px; font-size: .875rem; }
    pre    { background: #1e293b; padding: 1rem; border-radius: 6px; overflow-x: auto; }
    .tag   { background: #0f4c81; color: #93c5fd; font-size: .75rem; padding: .2rem .6rem; border-radius: 999px; }
    footer { text-align: center; padding: 2rem; color: #475569; font-size: .8rem; margin-top: 4rem; border-top: 1px solid #1e293b; }
  </style>
</head>
<body>
  <header>
    <a href="/">{{ .Site.Title }}</a>
    <nav>
      <a href="/">Home</a>
      <a href="/posts/">Posts</a>
      <a href="/about/">About</a>
    </nav>
  </header>
  <main>{{ block "main" . }}{{ end }}</main>
  <footer>Built with Hugo · {{ now.Format "2006" }}</footer>
</body>
</html>
