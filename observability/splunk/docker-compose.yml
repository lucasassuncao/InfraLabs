name: splunk

volumes:
  splunk_data:
  splunk_etc:

networks:
  splunk:
    driver: bridge

services:
  # ─── Splunk Enterprise ────────────────────────────────────
  splunk:
    image: splunk/splunk:latest
    container_name: splunk
    restart: unless-stopped
    ports:
      - "8000:8000"    # Splunk Web UI
      - "8088:8088"    # HEC (HTTP Event Collector)
      - "8089:8089"    # Management/REST API
      - "9997:9997"    # Forwarder receiving
      - "514:514/udp"  # Syslog UDP
    environment:
      SPLUNK_START_ARGS: --accept-license
      SPLUNK_GENERAL_TERMS: --accept-sgt-current-at-splunk-com
      SPLUNK_PASSWORD: changeme123!
      SPLUNK_HEC_TOKEN: splunk-hec-token-00000000
      SPLUNK_APPS_URL: ""
    volumes:
      - splunk_data:/opt/splunk/var
      - splunk_etc:/opt/splunk/etc
    networks:
      - splunk
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/en-US/account/login"]
      interval: 30s
      timeout: 15s
      retries: 10
      start_period: 120s

  # ─── Universal Forwarder (ships Docker logs to Splunk) ────
  splunk-forwarder:
    image: splunk/universalforwarder:latest
    container_name: splunk-forwarder
    restart: unless-stopped
    environment:
      SPLUNK_START_ARGS: --accept-license
      SPLUNK_GENERAL_TERMS: --accept-sgt-current-at-splunk-com
      SPLUNK_PASSWORD: changeme123!
      SPLUNK_FORWARD_SERVER: splunk:9997
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/log:/var/log:ro
      - ./config/forwarder/inputs.conf:/opt/splunkforwarder/etc/system/local/inputs.conf:ro
    depends_on:
      splunk:
        condition: service_healthy
    networks:
      - splunk
