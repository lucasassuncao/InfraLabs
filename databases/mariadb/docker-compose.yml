name: mariadb

volumes:
  mariadb_data:

networks:
  mariadb:
    driver: bridge

services:
  # ─── MariaDB ──────────────────────────────────────────────
  mariadb:
    image: mariadb:11
    container_name: mariadb
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MARIADB_ROOT_PASSWORD: admin
      MARIADB_DATABASE: devdb
      MARIADB_USER: admin
      MARIADB_PASSWORD: admin
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./config/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - mariadb
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── phpMyAdmin ───────────────────────────────────────────
  phpmyadmin-mariadb:
    image: phpmyadmin:latest
    container_name: phpmyadmin-mariadb
    restart: unless-stopped
    ports:
      - "5052:80"
    environment:
      PMA_HOST: mariadb
      PMA_PORT: 3306
      PMA_USER: admin
      PMA_PASSWORD: admin
    depends_on:
      mariadb:
        condition: service_healthy
    networks:
      - mariadb
