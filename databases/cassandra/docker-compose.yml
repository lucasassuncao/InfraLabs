name: cassandra

volumes:
  cassandra_data:

networks:
  cassandra:
    driver: bridge

services:
  # ─── Cassandra ────────────────────────────────────────────
  cassandra:
    image: cassandra:4.1
    container_name: cassandra
    restart: unless-stopped
    ports:
      - "9042:9042"   # CQL native transport
    environment:
      CASSANDRA_CLUSTER_NAME: dev-cluster
      CASSANDRA_DC: dc1
      CASSANDRA_RACK: rack1
      CASSANDRA_ENDPOINT_SNITCH: GossipingPropertyFileSnitch
      MAX_HEAP_SIZE: 512M
      HEAP_NEWSIZE: 128M
    volumes:
      - cassandra_data:/var/lib/cassandra
      - ./config/init.cql:/docker-entrypoint-initdb.d/init.cql:ro
    networks:
      - cassandra
    healthcheck:
      test: ["CMD-SHELL", "nodetool status | grep -q '^UN'"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
