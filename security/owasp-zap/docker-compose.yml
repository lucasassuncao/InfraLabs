name: owasp-zap

networks:
  owasp-zap:
    driver: bridge

services:
  # ─── OWASP ZAP (Web Security Scanner) ────────────────────
  zap:
    image: zaproxy/zap-stable:latest
    container_name: owasp-zap
    restart: unless-stopped
    ports:
      - "8093:8080"   # ZAP proxy / API
    command:
      - zap.sh
      - "-daemon"
      - "-host"
      - "0.0.0.0"
      - "-port"
      - "8080"
      - "-config"
      - "api.addrs.addr.name=.*"
      - "-config"
      - "api.addrs.addr.regex=true"
      - "-config"
      - "api.key=zapkey"
      - "-config"
      - "api.disablekey=false"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - owasp-zap
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:8080/JSON/core/view/version/?apikey=zapkey | grep -q 'version'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
